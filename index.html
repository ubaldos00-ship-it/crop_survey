<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>농작물생산조사 기점 계산기</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; padding: 10px; background-color: #f0f2f5; color: #1c1e21; margin: 0; }
        .container { max-width: 500px; margin: 10px auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        h2 { text-align: center; color: #1a237e; font-size: 1.5rem; margin-top: 0; margin-bottom: 20px; border-bottom: 2px solid #9fa8da; padding-bottom: 10px; }
        .section { background: #ffffff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .section-title { font-weight: bold; color: #283593; margin-bottom: 15px; font-size: 1rem; display: flex; align-items: center; }
        .section-title::before { content: "📋"; margin-right: 8px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 0.9rem; font-weight: 600; color: #4b4b4b; }
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; border: 1px solid #ccd0d5; border-radius: 8px; box-sizing: border-box; font-size: 1rem; background-color: #f9fafb; }
        input:focus { outline: none; border-color: #3f51b5; background-color: #fff; box-shadow: 0 0 0 2px rgba(63, 81, 181, 0.2); }
        .ratio-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .ratio-item { text-align: center; }
        .ratio-item span { font-size: 0.75rem; color: #777; display: block; margin-bottom: 4px; }
        .btn-group { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; margin-top: 20px; }
        button { padding: 16px; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        .btn-calc { background-color: #1a237e; color: white; }
        .btn-reset { background-color: #e4e6eb; color: #4b4b4b; }
        .result-panel { margin-top: 20px; display: none; }
        .summary-card { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 10px; padding: 12px; margin-bottom: 15px; font-size: 0.85rem; line-height: 1.6; }
        .result-card { background: #e8eaf6; border: 1px solid #c5cae9; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .card-header { font-weight: bold; color: #1a237e; border-bottom: 1px solid #c5cae9; margin-bottom: 10px; padding-bottom: 5px; font-size: 1rem; }
        .res-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 0.95rem; }
        .res-label { flex: 1; font-weight: 600; color: #333; }
        .res-vals { text-align: right; }
        .res-val-main { font-weight: 900; color: #d32f2f; display: block; font-size: 1.3rem; }
        .res-val-sub { font-size: 0.85rem; color: #666; display: block; margin-top: 2px; }
        .alert-box { background-color: #ffebee; color: #c62828; padding: 12px; border-radius: 8px; margin-top: 10px; font-weight: bold; text-align: center; display: none; border: 1px solid #ffcdd2; }
    </style>
</head>
<body>
<div class="container">
    <h2>🌾 농작물생산조사 기점 계산기</h2>
    
    <div class="section">
        <label>필지 주소</label>
        <input type="text" id="address" placeholder="필지 주소 입력">
    </div>

    <div class="section">
        <div class="section-title">비율 설정</div>
        <div style="margin-bottom:10px;">
            <label style="font-size:0.85rem;"><input type="radio" name="rType" value="1" checked> 1번 비율 세트</label>
            <div class="ratio-grid">
                <div class="ratio-item"><span>가(가로)</span><input type="text" id="r1_ga" value="0."></div>
                <div class="ratio-item"><span>나(A세로)</span><input type="text" id="r1_na" value="0."></div>
                <div class="ratio-item"><span>다(B세로)</span><input type="text" id="r1_da" value="0."></div>
            </div>
        </div>
        <div>
            <label style="font-size:0.85rem;"><input type="radio" name="rType" value="2"> 2번 비율 세트</label>
            <div class="ratio-grid">
                <div class="ratio-item"><span>가(가로)</span><input type="text" id="r2_ga" value="0."></div>
                <div class="ratio-item"><span>나(A세로)</span><input type="text" id="r2_na" value="0."></div>
                <div class="ratio-item"><span>다(B세로)</span><input type="text" id="r2_da" value="0."></div>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">조사값 입력</div>
        <div class="input-group">
            <label>가나 총길이 (추출간격)</label>
            <input type="number" id="lenGaNa" oninput="updateHalf()" placeholder="숫자 입력">
            <div style="font-size: 0.75rem; color: #777; margin-top: 4px;">👉 추출간격 / 2 = <span id="halfVal" style="color:#d32f2f; font-weight:bold;">0</span> (이랑/cm)</div>
        </div>
        <div class="input-group">
            <label>A 지점 세로 총길이 (cm)</label>
            <input type="number" id="heightA" placeholder="A 세로 전체">
        </div>
        <div class="input-group">
            <label>B 지점 세로 총길이 (cm)</label>
            <input type="number" id="heightB" placeholder="B 세로 전체">
        </div>
        <div class="input-group">
            <label>A포구 10개 이랑 평균너비 (cm)</label>
            <input type="number" id="waAvg" placeholder="평균값 입력">
        </div>
        <div class="input-group">
            <label>B포구 10개 이랑 평균너비 (cm)</label>
            <input type="number" id="wbAvg" placeholder="평균값 입력">
        </div>
    </div>

    <div id="alertBox" class="alert-box">⚠️ 가로지점이 0입니다. <br>2번 비율을 사용하세요.</div>

    <div class="btn-group">
        <button class="btn-reset" onclick="location.reload()">초기화</button>
        <button class="btn-calc" onclick="calculate()">계산하기</button>
    </div>

    <div id="resultBox" class="result-panel">
        <div class="summary-card" id="inputSummary"></div>

        <div class="result-card">
            <div class="card-header">🅰️ A 포구 산출 결과</div>
            <div class="res-row">
                <span class="res-label">가로 기점</span>
                <div class="res-vals">
                    <span id="outA_ga" class="res-val-main">-</span>
                    <span id="outA_ga_raw" class="res-val-sub">-</span>
                </div>
            </div>
            <div class="res-row">
                <span class="res-label">세로 기점</span>
                <div class="res-vals">
                    <span id="outA_se" class="res-val-main">-</span>
                    <span id="outA_se_raw" class="res-val-sub">-</span>
                </div>
            </div>
            <div class="res-row">
                <span class="res-label">3㎡ 조사 이랑길이</span>
                <div class="res-vals">
                    <span id="outLenA" class="res-val-main">-</span>
                    <span id="outLenA_raw" class="res-val-sub">-</span>
                </div>
            </div>
        </div>

        <div class="result-card">
            <div class="card-header">🅱️ B 포구 산출 결과</div>
            <div class="res-row">
                <span class="res-label">가로 기점</span>
                <div class="res-vals">
                    <span id="outB_ga" class="res-val-main">-</span>
                    <span id="outB_ga_raw" class="res-val-sub">-</span>
                </div>
            </div>
            <div class="res-row">
                <span class="res-label">세로 기점</span>
                <div class="res-vals">
                    <span id="outB_se" class="res-val-main">-</span>
                    <span id="outB_se_raw" class="res-val-sub">-</span>
                </div>
            </div>
            <div class="res-row">
                <span class="res-label">3㎡ 조사 이랑길이</span>
                <div class="res-vals">
                    <span id="outLenB" class="res-val-main">-</span>
                    <span id="outLenB_raw" class="res-val-sub">-</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function updateHalf() {
        const v = parseFloat(document.getElementById('lenGaNa').value);
        document.getElementById('halfVal').innerText = isNaN(v) ? "0" : (v / 2).toFixed(1);
    }

    function calculate() {
        const addr = document.getElementById('address').value;
        const L = parseFloat(document.getElementById('lenGaNa').value);
        const Ha = parseFloat(document.getElementById('heightA').value);
        const Hb = parseFloat(document.getElementById('heightB').value);
        const waA = parseFloat(document.getElementById('waAvg').value);
        const wbA = parseFloat(document.getElementById('wbAvg').value);
        
        const sel = document.querySelector('input[name="rType"]:checked').value;
        const r1_ga = document.getElementById('r1_ga').value;
        const r1_na = document.getElementById('r1_na').value;
        const r1_da = document.getElementById('r1_da').value;
        const r2_ga = document.getElementById('r2_ga').value;
        const r2_na = document.getElementById('r2_na').value;
        const r2_da = document.getElementById('r2_da').value;

        const ga = parseFloat(document.getElementById('r'+sel+'_ga').value);
        const na = parseFloat(document.getElementById('r'+sel+'_na').value);
        const da = parseFloat(document.getElementById('r'+sel+'_da').value);
        
        if(isNaN(L) || isNaN(Ha) || isNaN(Hb) || isNaN(ga) || isNaN(na) || isNaN(da)) {
            alert("비율과 모든 조사값을 입력해주세요."); return;
        }

        document.getElementById('inputSummary').innerHTML = `
            <b>[입력 데이터 요약]</b><br>
            • 주소: ${addr || '미입력'}<br>
            • 선택 비율: ${sel}번 세트<br>
            • 1번 세트: 가(${r1_ga}), 나(${r1_na}), 다(${r1_da})<br>
            • 2번 세트: 가(${r2_ga}), 나(${r2_na}), 다(${r2_da})<br>
            • 가나총길이: ${L}, A세로: ${Ha}, B세로: ${Hb}, 평균너비: A(${waA || 0}), B(${wbA || 0})
        `;

        const a_ga_raw = L * ga;
        const b_ga_raw = a_ga_raw + (L / 2);
        const a_se_raw = Ha * na;
        const b_se_raw = Hb * da;

        function setRes(mainId, subId, val, unit) {
            // 사사오입(반올림) 처리: 소수점 이하 첫째 자리에서 반올림하여 정수 강조
            const rounded = Math.round(val);
            document.getElementById(mainId).innerText = rounded.toLocaleString() + " " + unit;
            // 보조 계산값 표시: 소수점 첫째 자리까지 표시
            document.getElementById(subId).innerText = "(계산값: " + val.toFixed(1) + ")";
        }

        setRes('outA_ga', 'outA_ga_raw', a_ga_raw, '이랑/cm');
        setRes('outA_se', 'outA_se_raw', a_se_raw, 'cm');
        setRes('outB_ga', 'outB_ga_raw', b_ga_raw, '이랑/cm');
        setRes('outB_se', 'outB_se_raw', b_se_raw, 'cm');

        if (Math.round(a_ga_raw) === 0) {
            document.getElementById('alertBox').style.display = 'block';
        } else {
            document.getElementById('alertBox').style.display = 'none';
        }

        if(waA > 0) {
            const val = 30000 / waA;
            setRes('outLenA', 'outLenA_raw', val, 'cm');
        }
        if(wbA > 0) {
            const val = 30000 / wbA;
            setRes('outLenB', 'outLenB_raw', val, 'cm');
        }

        document.getElementById('resultBox').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>
</body>
</html>
